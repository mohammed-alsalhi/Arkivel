<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're Offline</title>
  <style>
    :root {
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-foreground: #1a1a1a;
      --color-muted: #6b7280;
      --color-accent: #3b82f6;
      --color-border: #e5e7eb;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-background: #0f1117;
        --color-surface: #1a1d27;
        --color-foreground: #e8eaf0;
        --color-muted: #8b95a8;
        --color-accent: #60a5fa;
        --color-border: #2a2f3e;
      }
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--color-background);
      color: var(--color-foreground);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .card {
      background-color: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .icon {
      font-size: 3.5rem;
      margin-bottom: 1.5rem;
      opacity: 0.7;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: var(--color-foreground);
    }

    p {
      font-size: 0.9375rem;
      color: var(--color-muted);
      line-height: 1.6;
      margin-bottom: 1.25rem;
    }

    .cached-notice {
      background-color: var(--color-background);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      color: var(--color-muted);
      margin-bottom: 2rem;
    }

    .cached-notice strong {
      color: var(--color-foreground);
    }

    .btn {
      display: inline-block;
      background-color: var(--color-accent);
      color: #ffffff;
      border: none;
      border-radius: 6px;
      padding: 0.625rem 1.5rem;
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s ease;
      text-decoration: none;
    }

    .btn:hover {
      opacity: 0.88;
    }

    .btn:active {
      opacity: 0.75;
    }

    .footer-links {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .footer-links a {
      font-size: 0.875rem;
      color: var(--color-accent);
      text-decoration: none;
    }

    .footer-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" role="img" aria-label="No connection">
      &#x1F4F5;
    </div>
    <h1>You're offline</h1>
    <p>
      It looks like your internet connection is unavailable. The page you
      requested could not be loaded from the network.
    </p>
    <div class="cached-notice">
      <strong>Good news:</strong> Some pages you've recently visited may
      still be available from the local cache. Try navigating back to a
      page you've already loaded.
    </div>
    <button class="btn" onclick="window.location.reload()">
      Try again
    </button>
    <div class="footer-links">
      <a href="/">Home</a>
      <a href="/search">Search</a>
      <a href="/help">Help</a>
    </div>
  </div>
</body>
</html>
